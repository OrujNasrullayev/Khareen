databases:
  - name: khareen-db
    databaseName: clothes_rental
    plan: free

services:
  - type: web
    name: khareen-api
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: khareen-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.12
